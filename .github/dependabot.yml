version: 2
updates:
  # Test/CI Python dependencies (requirements_test.txt). Pinned exact so a
  # breaking upstream release lands as a red check on the bump PR, not on main.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "(deps)"
    labels:
      - "dependencies"
    groups:
      test-deps:
        patterns:
          - "*"

  # Keep the SHA-pinned GitHub Actions (checkout, setup-python, hassfest, hacs)
  # from silently drifting out of date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "(deps)"
    labels:
      - "dependencies"
    groups:
      actions:
        patterns:
          - "*"
