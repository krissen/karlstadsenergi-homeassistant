name: "Validate"

on:
  push:
  pull_request:
  schedule:
    # Odd off-peak time avoids the midnight UTC rush that rate-limits hacs/action.
    - cron: "17 4 * * *"

jobs:
  ruff:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
      - uses: "actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1"  # v6.3.0
        with:
          python-version: "3.14"
      - run: pip install ruff==0.15.20
      - run: ruff format --check .
      - run: ruff check .

  pytest:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
      - uses: "actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1"  # v6.3.0
        with:
          python-version: "3.14"
      - run: pip install -r requirements_test.txt
      - run: pytest tests/ -v

  hassfest:
    name: hassfest
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
      - uses: "home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c"  # master 2026-03-18

  # hacs/action validates the branch via the GitHub API rather than the local
  # checkout. On feature branches this races against post-merge branch deletion
  # ("branch has been removed") and fails spuriously, so restrict it to schedule
  # runs and pushes to main; ruff/pytest/hassfest still gate PRs.
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
      - name: HACS validation
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa  # main 2026-01-26
        with:
          category: integration
